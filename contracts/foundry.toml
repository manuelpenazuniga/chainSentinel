[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
evm_version = "london"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[invariant]
runs = 256
depth = 64
fail_on_revert = false

[rpc_endpoints]
paseo = "https://services.polkadothub-rpc.com/testnet"
